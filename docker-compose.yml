# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: finsight_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  finsight:
    build: .
    ports:
      - "8000:8000"
      - "8502:8502"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres   # override .env for Docker Compose networking
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
